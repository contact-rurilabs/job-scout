name: Job Scout

on:
  schedule:
    # 8:00 AM Mountain Time (UTC-6 in summer / UTC-7 in winter)
    - cron: "0 14 * * *"
    # 6:00 PM Mountain Time
    - cron: "0 0 * * *"
  # Lets you trigger manually from GitHub Actions tab
  workflow_dispatch:

jobs:
  search:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Run job search
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: node search.js
